name: Deploy health receiver worker

on:
  push:
    branches:
      - main
    paths:
      - "cloudflare-worker/**"
      - ".github/workflows/receiver-worker.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cloudflare-worker/package-lock.json

      - name: Install Wrangler
        working-directory: cloudflare-worker
        run: npm ci

      - name: Verify Cloudflare credentials
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Repository secret CLOUDFLARE_API_TOKEN is not configured."
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Repository secret CLOUDFLARE_ACCOUNT_ID is not configured."
            exit 1
          fi

      - name: Apply D1 migrations
        working-directory: cloudflare-worker
        run: npx wrangler d1 migrations apply health_receiver --remote

      - name: Deploy Worker
        working-directory: cloudflare-worker
        run: npx wrangler deploy
